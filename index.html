<!doctype html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments"></ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>
    "use strict";
    // Получаем ссылки на необходимые элементы страницы
    const commentsElement = document.querySelector(".comments");
    const addNameInput = document.querySelector(".add-form-name");
    const addFormComment = document.querySelector(".add-form-text");
    const addformButton = document.querySelector(".add-form-button");

    // Функция для получения текущей даты и времени в нужном формате
    const getCurrentTime = () => {
      return new Intl.DateTimeFormat("ru-RU", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      }).format(new Date());
    };

    const escapeHtml = (unsafe) => {
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    };

    // Массив с комментариями, который будет использоваться для отрисовки комментариев на странице
    const comments = [];

    // Обработчик клика по кнопке лайка (работает для старых и новых комментариев)
    const initLikeButtons = () => {
      const likeButtons = document.querySelectorAll(".like-button");

      for (const likeButton of likeButtons) {
        likeButton.addEventListener("click", (event) => {
          event.stopPropagation();

          const commentElem = likeButton.closest(".comment");
          const index = commentElem.dataset.index;
          const comment = comments[index];

          comment.isLiked = !comment.isLiked;
          comment.likes = Math.max(
            0,
            comment.likes + (comment.isLiked ? 1 : -1),
          );

          renderComments(comments);
          initLikeButtons();
          initCommentClick();
        });
      }
    };

    // Обработчик клика по комментарию для отображения его текста в алерте
    const initCommentClick = () => {
      const commentElements = document.querySelectorAll(".comment");

      for (const commentElement of commentElements) {
        commentElement.addEventListener("click", () => {
          const index = commentElement.dataset.index;
          const comment = comments[index];

          addFormComment.value = `> ${comment.author.name}: \n ${comment.text} \n\n`;
        });
      }
    };

    // Функция для получения комментариев с сервера и их отрисовки на странице
    const fetchAndRenderComments = () => {
      return fetch("https://wedev-api.sky.pro/api/v1/aman/comments", {
        method: "GET",
      })
        .then((response) => {
          return response.json();
        })
        .then((data) => {
          comments.push(...data.comments);
          renderComments(comments);
          initCommentClick();
          initLikeButtons();
        });
    };

    // Функция для отрисовки комментариев на странице
    const renderComments = (comments) => {
      commentsElement.innerHTML = comments
        .map((comment, index) => {
          return `
        <li class="comment" data-index="${index}">
          <div class="comment-header">
            <div>${escapeHtml(comment.author.name)}</div>
            <div>${comment.date}</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
            ${escapeHtml(comment.text)}
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">${comment.likes}</span>
              <button class="like-button ${comment.isLiked ? "-active-like" : ""}"></button>
            </div>
          </div>
        </li>`;
        })
        .join("");
    };

    // Обработчик события для кнопки "Написать"
    addformButton.addEventListener("click", () => {
      addNameInput.classList.remove("error");
      addFormComment.classList.remove("error");

      if (addNameInput.value === "" || addFormComment.value === "") {
        addNameInput.classList.add("error");
        addFormComment.classList.add("error");
        return;
      }

      // Получаем имя и текст комментария из полей ввода
      const name = addNameInput.value;
      const text = addFormComment.value;

      // Создаем новый объект комментария с данными из полей ввода и текущей датой
      const newComment = {
        text,
        name,
      };

      addNameInput.value = "";
      addFormComment.value = "";

      // Добавляем новый комментарий в массив комментариев
      fetch("https://wedev-api.sky.pro/api/v1/aman/comments", {
        method: "POST",
        body: JSON.stringify(newComment),
      })
        .then((response) => {
          console.log(response);
          return response.json();
        })
        .then((data) => {
          console.log(data);
          comments.length = 0; // Очистка массива комментариев перед загрузкой новых данных
          fetchAndRenderComments();
        });

      // Сохраняем новый комментарий на сервере
      renderComments(comments);
      initCommentClick();
    });

    // Инициализация страницы с комментариями и обработчиками событий
    fetchAndRenderComments();
    initLikeButtons();
    initCommentClick();
  </script>
</html>
